# 服务器配置
server:
  port: 8088                # 服务端口
  mode: release              # 运行模式: debug, release, test
  read_timeout: 60s          # 读取超时
  write_timeout: 60s         # 写入超时
  shutdown_timeout: 10s      # 关闭超时

# 数据库配置
database:
  type: postgresql           # 数据库类型: postgresql, mysql, sqlite
  host: 127.0.0.1            # 数据库主机
  port: 5432                 # 数据库端口
  user: materials            # 数据库用户名
  password: "your-password"  # 数据库密码(生产环境请修改)
  database: materials        # 数据库名
  ssl_mode: disable          # SSL模式: disable, require, verify-ca, verify-full

  # 连接池配置
  max_idle_conns: 10         # 最大空闲连接数
  max_open_conns: 100        # 最大打开连接数
  max_lifetime: 3600         # 连接最大生存时间(秒)

# JWT配置
jwt:
  secret: "change-this-secret-key-in-production"  # JWT密钥(生产环境必须修改)
  expire_time: 24h         # Token过期时间
  issuer: "material-backend" # 签发者

# 上传配置
upload:
  max_file_size: 5242880   # 最大文件大小(字节) 5MB
  max_upload_count: 10     # 单次最大上传文件数
  allowed_types: "jpg,jpeg,png,gif,bmp,webp,svg,pdf,doc,docx,xls,xlsx"
  upload_dir: "static/uploads"
  generate_file_name: true # 是否生成随机文件名

# 日志配置
log:
  level: info               # 日志级别: debug, info, warn, error
  file_name: "logs/app.log" # 日志文件路径
  max_size: 100             # 单个日志文件最大大小(MB)
  max_backups: 3            # 保留的旧日志文件数量
  max_age: 7                # 保留旧日志文件的最大天数
  compress: true            # 是否压缩旧日志文件

# CORS 配置
cors:
  enabled: true             # 是否启用 CORS 白名单
  # 允许的域名列表，留空则允许所有域名
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://192.168.1.100:8088"
  allow_credentials: true   # 是否允许携带凭证

# AI 配置 (可选)
ai:
  # Agent 安全密钥，用于验证 AI Agent 请求签名
  agent_secret: "change-this-agent-secret-in-production"

# 微信小程序配置 (可选)
wechat:
  app_id: "your-wechat-appid"      # 微信小程序 AppID
  app_secret: "your-wechat-secret"  # 微信小程序 AppSecret
